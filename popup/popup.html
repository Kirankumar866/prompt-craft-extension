<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0d0820;
      color: #e8e0ff;
      font-family: 'DM Sans', -apple-system, sans-serif;
      overflow: hidden;
    }

    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #1a0f38, #0d0820);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(108,61,232,0.5), transparent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6c3de8, #c084fc);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 16px rgba(108,61,232,0.4);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #9b59f5, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .logo-tagline {
      font-size: 10.5px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.6);
    }

    .status-dot.inactive {
      background: rgba(255,255,255,0.2);
      box-shadow: none;
    }

    .body {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    .api-key-section {}

    .api-input-wrapper {
      position: relative;
    }

    .api-input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e8e0ff;
      font-family: 'DM Sans', monospace;
      font-size: 12.5px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .api-input:focus {
      border-color: rgba(108,61,232,0.6);
      box-shadow: 0 0 0 3px rgba(108,61,232,0.12);
    }

    .api-input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .toggle-visibility {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 2px;
      font-size: 14px;
      transition: color 0.15s;
    }

    .toggle-visibility:hover { color: rgba(255,255,255,0.7); }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6c3de8, #9b59f5);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 14px rgba(108,61,232,0.4);
      margin-top: 8px;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108,61,232,0.55);
    }

    .save-btn:active { transform: scale(0.97); }

    .save-btn.saved {
      background: linear-gradient(135deg, #059669, #10b981);
      box-shadow: 0 4px 14px rgba(16,185,129,0.4);
    }

    .platforms-section {}

    .platform-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
    }

    .platform-emoji { font-size: 14px; }

    .platform-name {
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
      flex: 1;
    }

    .platform-badge {
      font-size: 10px;
      font-weight: 600;
      color: #22c55e;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      padding: 1px 7px;
      border-radius: 100px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    .footer {
      padding: 10px 20px 16px;
      display: flex;
      justify-content: center;
    }

    .footer-link {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-link:hover { color: rgba(255,255,255,0.5); }

    .saved-msg {
      font-size: 11.5px;
      color: #10b981;
      text-align: center;
      margin-top: 4px;
      display: none;
    }
    .saved-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">✦</div>
      <div class="logo-text">
        <span class="logo-name">PromptCraft</span>
        <span class="logo-tagline">AI Prompt Enhancer</span>
      </div>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <div class="body">
    <div class="api-key-section">
      <div class="section-label">Groq API Key (Free)</div>
      <div class="api-input-wrapper">
        <input
          type="password"
          id="api-key-input"
          class="api-input"
          placeholder="gsk_..."
        />
        <button class="toggle-visibility" id="toggle-vis" title="Show/hide key">👁</button>
      </div>
      <button class="save-btn" id="save-btn">Save API Key</button>
      <p class="saved-msg" id="saved-msg">✓ API key saved successfully</p>
    </div>

    <div class="divider"></div>

    <div class="platforms-section">
      <div class="section-label">Supported Platforms</div>
      <div class="platform-list">
        <div class="platform-item">
          <span class="platform-emoji">🤖</span>
          <span class="platform-name">ChatGPT</span>
          <span class="platform-badge">Active</span>
        </div>
        <div class="platform-item">
          <span class="platform-emoji">🧠</span>
          <span class="platform-name">Claude.ai</span>
          <span class="platform-badge">Active</span>
        </div>
        <div class="platform-item">
          <span class="platform-emoji">💎</span>
          <span class="platform-name">Gemini</span>
          <span class="platform-badge">Active</span>
        </div>
        <div class="platform-item">
          <span class="platform-emoji">🐋</span>
          <span class="platform-name">DeepSeek</span>
          <span class="platform-badge">Active</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://console.groq.com/keys" target="_blank" class="footer-link">
      Get your free Groq API key (Llama 3.3 70B) →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
